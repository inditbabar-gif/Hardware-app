<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin - Gulzar Hardware</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #FF7B00; --dark: #1e272e; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #f1f2f6; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .login-box { background: white; padding: 30px; border-radius: 12px; width: 100%; max-width: 350px; text-align: center; }
        .app-header { background: var(--dark); color: white; padding: 16px; text-align: center; font-weight: bold; }
        .app-main { flex: 1; overflow-y: auto; padding-bottom: 80px; padding: 15px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        /* PRICE ROW FIX */
        .price-display { color: var(--primary); font-weight: bold; display: flex; align-items: center; margin-top: 5px; }
        .rs-icon { margin-right: 12px; color: #888; font-weight: normal; }

        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
        .btn-primary { background: var(--primary); color: white; border: none; border-radius: 8px; padding: 12px; width: 100%; font-weight: bold; }
        .btn-danger { background: #ff4757; color: white; border: none; padding: 10px 15px; border-radius: 6px; font-weight: bold; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #eee; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: white; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #ddd; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; color: #747d8c; font-size: 0.7rem; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 1.4rem; margin-bottom: 3px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>Admin Login</h2><br>
            <input type="text" id="inp_user" placeholder="Username">
            <input type="password" id="inp_pass" placeholder="Password">
            <button class="btn-primary" onclick="handleLogin()">LOGIN</button>
        </div>
    </div>

    <header class="app-header">Gulzar Admin</header>

    <main class="app-main">
        <section id="tab-dash" class="tab-content active">
            <div style="display:flex; gap:10px;">
                <div class="card" style="flex:1; text-align:center;"><p>Items</p><h2 id="stat_p">0</h2></div>
                <div class="card" style="flex:1; text-align:center;"><p>Orders</p><h2 id="stat_o">0</h2></div>
            </div>
            <div class="card">
                <h3>Store Banner</h3><br>
                <input type="text" id="inp_b_url" placeholder="Image URL">
                <input type="text" id="inp_b_txt" placeholder="Offer Text">
                <button class="btn-primary" onclick="updateBanner()">SAVE BANNER</button>
            </div>
        </section>

        <section id="tab-add" class="tab-content">
            <div class="card">
                <h3>New Product</h3><br>
                <input type="text" id="inp_p_name" placeholder="Name">
                <select id="sel_p_cat"></select>
                <input type="number" id="inp_p_price" placeholder="Price">
                <input type="text" id="inp_p_img" placeholder="Image URL">
                <textarea id="inp_p_desc" placeholder="Description"></textarea>
                <button class="btn-primary" onclick="saveProduct()">SAVE PRODUCT</button>
            </div>
            <div class="card">
                <h3>Add Category</h3><br>
                <div style="display:flex; gap:5px;">
                    <input type="text" id="inp_new_cat" style="flex:1;">
                    <button class="btn-primary" style="width:auto; padding:10px 20px;" onclick="saveCategory()">ADD</button>
                </div>
                <div id="div_cat_list" style="margin-top:10px;"></div>
            </div>
        </section>

        <section id="tab-manage" class="tab-content">
            <h3>All Stock</h3><br>
            <div id="div_manage_list" class="card"></div>
        </section>

        <section id="tab-orders" class="tab-content">
            <h3>Recent Orders</h3><br>
            <div id="div_order_list"></div>
        </section>
    </main>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('tab-dash', this)"><i class="fa-solid fa-house"></i><span>Dash</span></div>
        <div class="nav-item" onclick="switchTab('tab-add', this)"><i class="fa-solid fa-plus-circle"></i><span>Add</span></div>
        <div class="nav-item" onclick="switchTab('tab-manage', this)"><i class="fa-solid fa-box"></i><span>Stock</span></div>
        <div class="nav-item" onclick="switchTab('tab-orders', this)"><i class="fa-solid fa-receipt"></i><span>Orders</span></div>
    </nav>

    <script>
        const API = '/api';
        let token = localStorage.getItem('adminToken');

        window.onload = function() {
            if(token) {
                document.getElementById('login-screen').style.display = 'none';
                refreshData();
            }
        };

        async function handleLogin() {
            const u = document.getElementById('inp_user').value;
            const p = document.getElementById('inp_pass').value;
            const res = await fetch(API + '/admin/login', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: u, password: p})
            });
            const data = await res.json();
            if(data.token) {
                localStorage.setItem('adminToken', data.token);
                location.reload();
            } else { alert("Invalid Login"); }
        }

        function switchTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(function(t) { t.classList.remove('active'); });
            document.querySelectorAll('.nav-item').forEach(function(n) { n.classList.remove('active'); });
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            refreshData();
        }

        function refreshData() {
            loadStats(); loadCats(); loadProds(); loadOrders(); loadBanner();
        }

        async function loadStats() {
            const res = await fetch(API + '/admin/stats', { headers: {'Authorization': 'Bearer ' + token} });
            const data = await res.json();
            document.getElementById('stat_p').innerText = data.totalProducts;
            document.getElementById('stat_o').innerText = data.totalOrders;
        }

        async function loadBanner() {
            const res = await fetch(API + '/banner');
            const data = await res.json();
            document.getElementById('inp_b_url').value = data.imageUrl || '';
            document.getElementById('inp_b_txt').value = data.text || '';
        }

        async function updateBanner() {
            await fetch(API + '/banner', {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token},
                body: JSON.stringify({imageUrl: document.getElementById('inp_b_url').value, text: document.getElementById('inp_b_txt').value})
            });
            alert("Banner Updated");
        }

        async function loadCats() {
            const res = await fetch(API + '/categories');
            const data = await res.json();
            document.getElementById('sel_p_cat').innerHTML = data.map(function(c) { return '<option value="' + c.name + '">' + c.name + '</option>'; }).join('');
            document.getElementById('div_cat_list').innerHTML = data.map(function(c) { 
                return '<div class="item-row"><span>' + c.name + '</span><button class="btn-danger" onclick="delCat(\'' + c._id + '\')">DEL</button></div>';
            }).join('');
        }

        async function saveCategory() {
            const name = document.getElementById('inp_new_cat').value;
            await fetch(API + '/categories', {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token},
                body: JSON.stringify({name: name})
            });
            document.getElementById('inp_new_cat').value = '';
            loadCats();
        }

        async function delCat(id) {
            if(!confirm("Delete Category?")) return;
            await fetch(API + '/categories/' + id, { method: 'DELETE', headers: {'Authorization': 'Bearer ' + token} });
            loadCats();
        }

        async function loadProds() {
            const res = await fetch(API + '/products');
            const data = await res.json();
            document.getElementById('div_manage_list').innerHTML = data.map(function(p) {
                return '<div class="item-row"><div><b>' + p.name + '</b><div class="price-display"><span class="rs-icon">₹</span><span>' + p.price + '</span></div></div><button class="btn-danger" onclick="delProd(\'' + p._id + '\')">DELETE</button></div>';
            }).join('');
        }

        async function saveProduct() {
            const body = {
                name: document.getElementById('inp_p_name').value,
                category: document.getElementById('sel_p_cat').value,
                price: document.getElementById('inp_p_price').value,
                image: document.getElementById('inp_p_img').value,
                description: document.getElementById('inp_p_desc').value
            };
            await fetch(API + '/products', {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token},
                body: JSON.stringify(body)
            });
            alert("Product Added");
            refreshData();
        }

        // SIMPLE DIRECT DELETE FOR PRODUCTS
        async function delProd(id) {
            if(!confirm("Delete Product?")) return;
            const res = await fetch(API + '/products/' + id, { 
                method: 'DELETE', 
                headers: { 'Authorization': 'Bearer ' + token } 
            });
            if(res.ok) { refreshData(); } else { alert("Error deleting"); }
        }

        async function loadOrders() {
            const res = await fetch(API + '/orders/all', { headers: {'Authorization': 'Bearer ' + token} });
            const data = await res.json();
            document.getElementById('div_order_list').innerHTML = data.map(function(o) {
                return '<div class="card"><b>' + o.customerName + '</b><br><div class="price-display"><span class="rs-icon">₹</span><span>' + o.totalAmount + '</span></div><button class="btn-primary" style="margin-top:10px; padding:8px;" onclick="updOrder(\'' + o._id + '\', \'' + (o.status === 'Pending' ? 'Approved' : 'Paid') + '\')">' + (o.status === 'Pending' ? 'APPROVE' : 'MARK PAID') + '</button></div>';
            }).join('');
        }

        async function updOrder(id, s) {
            await fetch(API + '/orders/' + id + '/status', { method: 'PUT', headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token}, body: JSON.stringify({status: s})});
            loadOrders();
        }
    </script>
</body>
</html>
