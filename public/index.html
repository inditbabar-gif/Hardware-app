<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gulzar Hardware Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #FF7B00; --bg: #f5f6FA; --surface: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Roboto', sans-serif; background: var(--bg); color: #2d3436; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* HEADER */
        .app-header { background: var(--primary); color: white; padding: 15px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); z-index: 100; }
        
        .app-main { flex: 1; overflow-y: auto; padding-bottom: 80px; position: relative; }
        .tab-content { display: none; padding: 15px; }
        .tab-content.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* BANNER */
        .hero-banner { width: 100%; height: 150px; border-radius: 12px; overflow: hidden; position: relative; margin-bottom: 15px; background: #ddd; display: none; }
        .hero-banner img { width: 100%; height: 100%; object-fit: cover; }
        .hero-text { position: absolute; bottom: 0; width: 100%; padding: 8px; background: rgba(0,0,0,0.6); color: white; font-size: 0.8rem; }

        /* SEARCH & CATEGORY */
        .search-box { background: white; padding: 10px; margin-bottom: 15px; border-radius: 10px; display: flex; align-items: center; border: 1px solid #eee; }
        .search-box input { border: none; outline: none; width: 100%; margin-left: 10px; font-size: 0.9rem; }
        .category-bar { display: flex; overflow-x: auto; gap: 8px; margin-bottom: 15px; padding-bottom: 5px; }
        .cat-item { background: white; padding: 7px 15px; border-radius: 20px; font-size: 0.8rem; white-space: nowrap; border: 1px solid #eee; }
        .cat-item.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* PRODUCT CARDS */
        .grid-layout { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .card { background: #fff; border-radius: 10px; padding: 10px; display: flex; flex-direction: column; height: 260px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card img { width: 100%; height: 100px; object-fit: contain; margin-bottom: 8px; }
        .card-title { font-size: 0.85rem; font-weight: 500; height: 34px; overflow: hidden; margin-bottom: 5px; }
        
        /* RUPEE FIX */
        .price-row { color: var(--primary); font-weight: 700; font-size: 1.1rem; margin-top: auto; margin-bottom: 8px; display: flex; align-items: center; }
        .rs-symbol { margin-right: 8px; font-weight: 400; color: #777; } 

        .btn-primary { background: var(--primary); color: white; border: none; border-radius: 6px; padding: 10px; width: 100%; font-weight: 700; cursor: pointer; }

        /* BOTTOM NAV - STABLE VERSION */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: #fff; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #ddd; z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; color: #747d8c; cursor: pointer; }
        .nav-item i { font-size: 1.4rem; margin-bottom: 3px; }
        .nav-item span { font-size: 0.7rem; }
        .nav-item.active { color: var(--primary); }

        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:2000; display:none; flex-direction:column; padding:20px; overflow-y:auto; }
        .overlay.show { display: flex; }
        .order-card { background: #fff; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 5px solid var(--primary); }
    </style>
</head>
<body>

    <header class="app-header"><h1>Gulzar Hardware Store</h1></header>

    <main class="app-main">
        <!-- Home -->
        <section id="tab-home" class="tab-content active">
            <div class="hero-banner" id="banner-box"><img id="banner-img" src=""><div class="hero-text" id="banner-txt"></div></div>
            <div class="search-box"><i class="fa-solid fa-search"></i><input type="text" id="search-input" placeholder="Search..." oninput="searchProducts()"></div>
            <div class="category-bar" id="cat-bar"><div class="cat-item active" onclick="filterByCat('All', this)">All</div></div>
            <div id="products-grid" class="grid-layout"></div>
        </section>
        
        <!-- Cart -->
        <section id="tab-cart" class="tab-content">
            <h2 style="margin-bottom:15px;">Cart</h2>
            <div id="cart-list"></div>
            <div id="cart-footer" style="display:none; margin-top:15px; background:white; padding:15px; border-radius:10px;">
                <div style="display:flex; justify-content:space-between; margin-bottom:10px;"><b>Total:</b> <span class="price-row" style="margin:0;"><span class="rs-symbol">₹</span><span id="total-price">0</span></span></div>
                <input type="text" id="cust-name" placeholder="Your Name" style="width:100%; padding:12px; border-radius:8px; border:1px solid #ccc; margin-bottom:10px;">
                <button class="btn-primary" onclick="placeOrder()">ORDER NOW</button>
            </div>
            <div id="cart-empty" style="text-align:center; margin-top:50px; opacity:0.3;">Empty</div>
        </section>

        <!-- Orders -->
        <section id="tab-orders" class="tab-content">
            <div id="order-login" style="background:white; padding:20px; border-radius:10px;">
                <input type="text" id="view-name" placeholder="Enter Name" style="width:100%; padding:12px; border-radius:8px; border:1px solid #ccc; margin-bottom:10px;">
                <button class="btn-primary" onclick="manualSearch()">VIEW HISTORY</button>
            </div>
            <div id="orders-display" style="display:none;">
                <div style="display:flex; justify-content:space-between; margin-bottom:15px;"><h2>Orders</h2><button onclick="logoutUser()" style="color:red; border:none; background:none; font-size:0.7rem;">LOGOUT</button></div>
                <div id="order-list"></div>
            </div>
        </section>
    </main>

    <!-- Overlays -->
    <div id="detail-overlay" class="overlay">
        <button onclick="document.getElementById('detail-overlay').classList.remove('show')" style="padding:10px; margin-bottom:10px;">BACK</button>
        <div id="detail-content" style="background:#fff; padding:20px; border-radius:12px;"></div>
    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
        <div class="nav-item active" data-target="tab-home"><i class="fa-solid fa-house"></i><span>Home</span></div>
        <div class="nav-item" data-target="tab-cart"><i class="fa-solid fa-cart-shopping"></i><span>Cart</span></div>
        <div class="nav-item" data-target="tab-orders"><i class="fa-solid fa-receipt"></i><span>Orders</span></div>
    </nav>

    <script>
        const API = '/api';
        let cart = JSON.parse(localStorage.getItem('gulzar_cart') || '[]');
        let savedUser = localStorage.getItem('gulzar_name') || '';
        let allProducts = [];

        // --- 1. THE SAFETY START (TABS FIRST) ---
        window.onload = () => {
            setupNav(); // Enable tabs instantly
            try {
                if(savedUser) {
                    document.getElementById('cust-name').value = savedUser;
                    document.getElementById('view-name').value = savedUser;
                }
                loadInitialData();
            } catch(e) { console.log("Init Error"); }
        };

        function setupNav() {
            const items = document.querySelectorAll('.nav-item');
            const tabs = document.querySelectorAll('.tab-content');
            items.forEach(item => {
                item.onclick = () => {
                    items.forEach(n => n.classList.remove('active'));
                    tabs.forEach(t => t.classList.remove('active'));
                    item.classList.add('active');
                    const target = item.getAttribute('data-target');
                    document.getElementById(target).classList.add('active');
                    if(target === 'tab-cart') renderCart();
                    if(target === 'tab-orders' && savedUser) loadOrders(savedUser);
                };
            });
        }

        async function loadInitialData() {
            fetchBanner();
            fetchCategories();
            fetchProducts();
        }

        async function fetchBanner() {
            try {
                const res = await fetch(`${API}/banner`);
                const b = await res.json();
                if(b.imageUrl) {
                    document.getElementById('banner-box').style.display = 'block';
                    document.getElementById('banner-img').src = b.imageUrl;
                    document.getElementById('banner-txt').innerText = b.text;
                }
            } catch(e) {}
        }

        async function fetchCategories() {
            try {
                const res = await fetch(`${API}/categories`);
                const cats = await res.json();
                const bar = document.getElementById('cat-bar');
                cats.forEach(c => {
                    const div = document.createElement('div');
                    div.className = 'cat-item';
                    div.innerText = c.name;
                    div.onclick = () => filterByCat(c.name, div);
                    bar.appendChild(div);
                });
            } catch(e) {}
        }

        async function fetchProducts() {
            try {
                const res = await fetch(`${API}/products`);
                allProducts = await res.json();
                renderProducts(allProducts);
            } catch(e) {}
        }

        function renderProducts(list) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = list.map(p => `
                <div class="card" onclick="showDetails('${p._id}')">
                    <img src="${p.image}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1162/1162456.png'">
                    <div class="card-title">${p.name}</div>
                    <div class="price-row"><span class="rs-symbol">₹</span><span>${p.price}</span></div>
                    <button class="btn-primary" onclick="event.stopPropagation(); addToCart('${p._id}', '${p.name}', ${p.price})">ADD</button>
                </div>
            `).join('');
        }

        function searchProducts() {
            const q = document.getElementById('search-input').value.toLowerCase();
            renderProducts(allProducts.filter(p => p.name.toLowerCase().includes(q)));
        }

        function filterByCat(cat, el) {
            document.querySelectorAll('.cat-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            renderProducts(cat === 'All' ? allProducts : allProducts.filter(p => p.category === cat));
        }

        function showDetails(id) {
            const p = allProducts.find(x => x._id === id);
            document.getElementById('detail-content').innerHTML = `
                <img src="${p.image}" style="width:100%; height:180px; object-fit:contain;">
                <h2 style="margin:10px 0;">${p.name}</h2>
                <div class="price-row" style="justify-content:center; font-size:1.4rem;"><span class="rs-symbol">₹</span><span>${p.price}</span></div>
                <p style="text-align:left; color:gray; font-size:0.9rem; margin-bottom:15px;">${p.description || 'Quality Hardware'}</p>
                <button class="btn-primary" onclick="addToCart('${p._id}', '${p.name}', ${p.price}); document.getElementById('detail-overlay').classList.remove('show')">ADD TO CART</button>
            `;
            document.getElementById('detail-overlay').classList.add('show');
        }

        function addToCart(id, name, price) {
            const ex = cart.find(i => i.productId === id);
            if(ex) ex.quantity++; else cart.push({ productId: id, name, price, quantity: 1 });
            localStorage.setItem('gulzar_cart', JSON.stringify(cart));
            alert("Added!");
        }

        function updateQty(id, delta) {
            const i = cart.find(x => x.productId === id);
            i.quantity += delta;
            if(i.quantity <= 0) cart = cart.filter(x => x.productId !== id);
            localStorage.setItem('gulzar_cart', JSON.stringify(cart));
            renderCart();
        }

        function renderCart() {
            const list = document.getElementById('cart-list');
            if(cart.length === 0) { 
                list.innerHTML = ''; document.getElementById('cart-footer').style.display='none';
                document.getElementById('cart-empty').style.display='block'; return;
            }
            document.getElementById('cart-empty').style.display='none';
            document.getElementById('cart-footer').style.display='block';
            let total = 0;
            list.innerHTML = cart.map(i => {
                total += (i.price * i.quantity);
                return `<div class="cart-item">
                    <div><b>${i.name}</b><br><div class="price-row" style="font-size:0.9rem; margin:0;"><span class="rs-symbol">₹</span><span>${i.price}</span></div></div>
                    <div style="display:flex; align-items:center; gap:10px;">
                        <button onclick="updateQty('${i.productId}', -1)" style="width:25px; height:25px; background:#eee; border:none;">-</button>
                        <span>${i.quantity}</span>
                        <button onclick="updateQty('${i.productId}', 1)" style="width:25px; height:25px; background:#eee; border:none;">+</button>
                    </div>
                </div>`;
            }).join('');
            document.getElementById('total-price').innerText = total;
        }

        async function placeOrder() {
            const name = document.getElementById('cust-name').value;
            if(!name) return alert("Enter Name");
            await fetch(`${API}/orders`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ customerName: name, items: cart, totalAmount: cart.reduce((a,b)=>a+(b.price*b.quantity),0) })
            });
            cart = []; localStorage.setItem('gulzar_cart', '[]');
            localStorage.setItem('gulzar_name', name); location.reload();
        }

        function manualSearch() {
            const name = document.getElementById('view-name').value;
            if(!name) return alert("Enter name");
            localStorage.setItem('gulzar_name', name); savedUser = name;
            loadOrders(name);
        }

        function logoutUser() { localStorage.removeItem('gulzar_name'); location.reload(); }

        async function loadOrders(name) {
            const res = await fetch(`${API}/orders/${name}`);
            const data = await res.json();
            document.getElementById('order-login').style.display = 'none';
            document.getElementById('orders-display').style.display = 'block';
            const list = document.getElementById('order-list');
            list.innerHTML = data.reverse().map(o => `
                <div class="order-card">
                    <span style="float:right; font-size:0.7rem; color:orange;">${o.status}</span>
                    <div class="price-row" style="margin:0;"><span class="rs-symbol">₹</span><span>${o.totalAmount}</span></div>
                    <small style="color:gray;">${new Date(o.createdAt).toLocaleDateString()}</small><br>
                    ${o.status !== 'Pending' ? `<button class="btn-primary" style="margin-top:10px; padding:5px; font-size:0.7rem;" onclick="window.location.href='/api/invoice/${o._id}'">VIEW BILL</button>` : ''}
                </div>
            `).join('');
        }
    </script>
</body>
</html>
